name: content-validation

on:
  pull_request:
  push:
    branches: [ main, work ]

jobs:
  validate-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate content JSON and links
        run: python scripts/validate_content.py